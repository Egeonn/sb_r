name: rule update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

# 🌟 必须显式声明写入权限，否则无法推送到 release 分支
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 升级到 v4

      - name: Setup sing-box
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.13.8/sing-box_1.13.8_linux_amd64.deb"
        run: |
          set -Eeuo pipefail
          wget -O sing-box.deb $SING_BOX_DEB_URL
          sudo dpkg -i sing-box.deb

      - name: Set up Python3
        uses: actions/setup-python@v5  # 升级到 v5
        with:
          python-version: '3.11' # 指定一个明确的高级版本，提升稳定性

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyyaml

      - name: Run script
        working-directory: ./rule/
        run: |
          python ../main.py

      # 🌟 用自动部署插件替换了原来繁琐的 git 原生命令
      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release           # 指定输出到 release 分支
          publish_dir: ./rule               # 只把你脚本输出的 rule 文件夹里的内容推过去
          force_orphan: true                # 清空历史提交，防止仓库体积爆炸
          commit_message: "🔄 Update sing-box rules"
          enable_jekyll: true               # 防止生成 .nojekyll 文件，保持分支清爽
