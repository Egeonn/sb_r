name: Config Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🚨 安全升级：加入 SHA256 校验，防范供应链投毒
      - name: Setup sing-box (Secure Download)
        env:
          SING_BOX_DEB_URL: "https://github.com/SagerNet/sing-box/releases/download/v1.13.8/sing-box_1.13.8_linux_amd64.deb"
          # 这是 1.13.8 amd64 官方发布的真实 SHA256 校验和
          EXPECTED_SHA256: "9eab4a81cf133f9fb57f0fbbdceea4f481358baf00f727c6dc527712fc6b3b0d"
        run: |
          set -Eeuo pipefail
          wget -q -O sing-box.deb $SING_BOX_DEB_URL
          
          # 校验文件哈希值
          ACTUAL_SHA256=$(sha256sum sing-box.deb | awk '{ print $1 }')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "❌ 安全警告: sing-box 下载文件 SHA256 校验失败！可能被篡改！"
            echo "预期: $EXPECTED_SHA256"
            echo "实际: $ACTUAL_SHA256"
            exit 1
          fi
          
          echo "✅ SHA256 校验通过，允许安装"
          sudo dpkg -i sing-box.deb

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyyaml

      - name: Run script
        run: |
          mkdir -p ./rule
          cd ./rule
          python ../main.py

      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release           
          publish_dir: ./rule               
          force_orphan: true                
          commit_message: "🔄 Update sing-box rules"
          enable_jekyll: true
