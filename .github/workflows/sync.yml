name: rule update

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

# 🌟 必须显式声明写入权限，否则无法推送到 release 分支
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup sing-box latest
        run: |
          set -Eeuo pipefail
          
          # 1. 调用 GitHub API 获取最新 Release 的 tag (例如 v1.13.8)
          LATEST_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name)
          
          # 2. 去除版本号开头的 'v' 字符 (变成 1.13.8)，用于拼接 deb 文件名
          VERSION=${LATEST_TAG#v}
          
          # 3. 拼接动态下载链接
          DOWNLOAD_URL="https://github.com/SagerNet/sing-box/releases/download/${LATEST_TAG}/sing-box_${VERSION}_linux_amd64.deb"
          
          echo "🚀 发现 sing-box 最新版本: $LATEST_TAG, 正在下载..."
          wget -q -O sing-box.deb "$DOWNLOAD_URL"
          
          # 4. 安装并验证是否成功
          sudo dpkg -i sing-box.deb
          sing-box version

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pyyaml

      - name: Run script
        run: |
          mkdir -p ./rule
          cd ./rule
          python ../main.py

      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release           
          publish_dir: ./rule               
          force_orphan: true                
          commit_message: "🔄 Update sing-box rules"
          enable_jekyll: true
